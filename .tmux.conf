# ─── Container tmux config ────────────────────────────────────────
# For DevPod/Docker containers accessed via SSH from phone (Termius)
# Clipboard: OSC 52 only (no win32yank inside Linux containers)

# ─── General ──────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10
set -g history-limit 10000
set -g focus-events on

# ─── Terminal & Colors ────────────────────────────────────────────
# Container tmux is typically from apt (3.2a-3.4) — use xterm-256color
# which is universally available. tmux-256color may not have terminfo.
set -g default-terminal "xterm-256color"
set -as terminal-features ',xterm-256color:RGB:clipboard:Sync'

# Explicitly clear terminal-overrides to remove any stale smcup@:rmcup@
# from previous configs. Without this, tmux source-file won't clear options
# that were set in a prior config but are now absent.
set -g terminal-overrides ''
# NOTE: smcup@:rmcup@ was previously set here for Termius swipe scrolling,
# but it causes text fragments/corruption when scrolling because alternate
# screen programs (Claude Code, vim) dump TUI output into main scrollback.
# The WheelUpPane binding below is the replacement — it enters tmux copy
# mode on scroll, which works on both phone and desktop without corruption.

# ─── Clipboard ────────────────────────────────────────────────────
# OSC 52: tmux copies to client clipboard via escape sequences
# Works through SSH → Termius on Android, Windows Terminal on desktop
set -s set-clipboard on

# Copy mode: vi keys, OSC 52 handles clipboard automatically
setw -g mode-keys vi

# ─── Mouse ───────────────────────────────────────────────────────
# Mouse wheel: auto-enter copy mode on scroll up (enables scrollback)
bind -n WheelUpPane if-shell -F -t= '#{mouse_any_flag}' \
    'send-keys -M' \
    'if -Ft= "#{pane_in_mode}" "send-keys -M" "copy-mode -eH; send-keys -M"'

# Mouse drag: auto-enter copy mode and begin selection on drag start
bind -n MouseDrag1Pane if -Ft= '#{mouse_any_flag}' \
    'if -Ft= "#{pane_in_mode}" "copy-mode -eHM" "send-keys -M"' \
    'copy-mode -eHM'
bind -T copy-mode-vi MouseDrag1Pane send-keys -X begin-selection

# On drag release: copy via OSC 52 (no win32yank in containers)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Keyboard copy in copy mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# Right-click: unbind tmux's context menu. We do NOT bind paste-buffer here
# because Windows Terminal / Termius already paste the system clipboard on
# right-click — adding paste-buffer causes double-paste (old buffer + clipboard).
unbind -n MouseDown3Pane

# ─── Prefix ──────────────────────────────────────────────────────
set -g prefix2 C-a
bind C-a send-prefix -2

# ─── Titles ───────────────────────────────────────────────────────
set -g set-titles off

# ─── Status Bar ───────────────────────────────────────────────────
# Position at top so Claude Code's statusline owns the bottom row
set -g status-position top
set -g status-left " #S "
set -g status-right " %H:%M "

# Hide status bar when scrolling (copy mode) so it doesn't cover content
set-hook -g pane-mode-changed 'if-shell -F "#{pane_in_mode}" "set -g status off" "set -g status on"'
